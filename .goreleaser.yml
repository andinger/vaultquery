version: 2

builds:
  - main: ./cmd/vaultquery
    binary: vaultquery
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: andinger
      name: homebrew-vaultquery
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/andinger/vaultquery
    description: Query Obsidian vault files by YAML frontmatter
    license: MIT
    install: |
      bin.install "vaultquery"
    test: |
      system bin/"vaultquery", "--version"
